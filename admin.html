<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN — Пользователи</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8; color: #1a1a2e;
    padding: 16px 14px 60px; max-width: 600px; margin: 0 auto;
  }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .sub { color: #666; font-size: 13px; margin-bottom: 20px; }

  /* Login */
  .login-card {
    background: #fff; border-radius: 14px;
    padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .login-card input {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid #ddd; border-radius: 10px;
    font-size: 16px; margin-bottom: 10px; outline: none;
    -webkit-appearance: none;
  }
  .login-card input:focus { border-color: #4f46e5; }
  .btn {
    width: 100%; padding: 14px;
    background: #4f46e5; color: #fff;
    border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer;
  }
  #loginError { color: #ef4444; font-size: 13px; margin-top: 8px; }

  /* Header row */
  .list-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 12px;
  }
  .list-header h2 { font-size: 16px; font-weight: 700; }
  .count {
    background: #ede9fe; color: #4f46e5;
    padding: 3px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 700;
  }

  /* User cards */
  .user-card {
    background: #fff; border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,.05);
    display: flex; align-items: center; gap: 12px;
  }
  .user-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: #ede9fe; color: #4f46e5;
    font-size: 18px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
  .user-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #888; flex-wrap: wrap;
  }
  .user-ip { font-family: monospace; color: #4f46e5; font-size: 12px; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }
  .dot.on { background: #22c55e; }
  .dot.off { background: #d1d5db; }
  .status-text { font-size: 12px; }
  .status-text.on { color: #16a34a; }
  .status-text.off { color: #9ca3af; }

  .del-btn {
    background: #fef2f2; border: none; cursor: pointer;
    color: #ef4444; font-size: 20px; padding: 8px;
    border-radius: 10px; flex-shrink: 0; line-height: 1;
  }

  .empty {
    text-align: center; color: #aaa;
    padding: 40px 20px; font-size: 14px;
  }

  /* Modal */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 100;
    align-items: flex-end; justify-content: center;
    padding: 0;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff; border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px; width: 100%;
    max-width: 600px; text-align: center;
  }
  .modal-handle {
    width: 36px; height: 4px; background: #e5e7eb;
    border-radius: 2px; margin: 0 auto 20px;
  }
  .modal h3 { font-size: 18px; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.5; }
  .modal-btns { display: flex; flex-direction: column; gap: 10px; }
  .modal-confirm {
    padding: 14px; background: #ef4444; color: #fff;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .modal-cancel {
    padding: 14px; border: 1.5px solid #e5e7eb;
    background: #fff; border-radius: 12px;
    font-size: 16px; font-weight: 600; cursor: pointer; color: #333;
  }
</style>
</head>
<body>

<h1>👥 Пользователи</h1>
<p class="sub">Управление VPN-конфигурациями</p>

<div id="loginCard" class="login-card">
  <input type="password" id="secretInput" placeholder="Пароль администратора"
    onkeydown="if(event.key==='Enter')loadUsers()">
  <button class="btn" onclick="loadUsers()">Войти</button>
  <div id="loginError"></div>
</div>

<div id="usersSection" style="display:none">
  <div class="list-header">
    <h2>Конфигурации</h2>
    <span class="count" id="count">0</span>
  </div>
  <div id="userList"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Удалить пользователя?</h3>
    <p id="modalText">Пользователь потеряет доступ к VPN.</p>
    <div class="modal-btns">
      <button type="button" class="modal-confirm" id="confirmBtn">🗑 Удалить</button>
      <button type="button" class="modal-cancel" id="cancelBtn">Отмена</button>
    </div>
  </div>
</div>

<script>
let secret = "";
let pendingPubkey = null;

async function loadUsers() {
  secret = document.getElementById("secretInput").value;
  const err = document.getElementById("loginError");
  err.textContent = "";
  try {
    const resp = await fetch("/api/users", { headers: { "X-Secret": secret } });
    if (resp.status === 403) throw new Error("Неверный пароль");
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("usersSection").style.display = "block";
    renderUsers(data.users || []);
  } catch(e) { err.textContent = e.message; }
}

function renderUsers(users) {
  document.getElementById("count").textContent = users.length;
  const list = document.getElementById("userList");
  if (!users.length) {
    list.innerHTML = '<div class="empty">Пользователей пока нет</div>';
    return;
  }
  window._users = users;
  list.innerHTML = users.map((u, i) => `
    <div class="user-card">
      <div class="user-avatar">${(u.name || "?")[0].toUpperCase()}</div>
      <div class="user-info">
        <div class="user-name">${u.name || "Без имени"}</div>
        <div class="user-meta">
          <span class="user-ip">${u.ip || "—"}</span>
          <span class="dot ${u.active ? 'on' : 'off'}"></span>
          <span class="status-text ${u.active ? 'on' : 'off'}">${u.active ? "Онлайн" : "Оффлайн"}</span>
        </div>
      </div>
      <button class="del-btn" onclick="askDelete(${i})">🗑</button>
    </div>
  `).join("");
}

function askDelete(idx) {
  const u = window._users[idx];
  pendingPubkey = u.pubkey;
  document.getElementById("modalText").textContent = `«${u.name || "Пользователь"}» потеряет доступ к VPN.`;
  document.getElementById("modalBg").classList.add("show");
}
function closeModal() {
  document.getElementById("modalBg").classList.remove("show");
  pendingPubkey = null;
}
async function confirmDelete() {
  console.log("confirmDelete called, pendingPubkey=", pendingPubkey);
  if (!pendingPubkey) { console.warn("no pendingPubkey"); return; }
  const pubkey = pendingPubkey;
  closeModal();
  try {
    const del = await fetch("/api/users", {
      method: "DELETE",
      headers: { "Content-Type": "application/json", "X-Secret": secret },
      body: JSON.stringify({ pubkey })
    });
    if (!del.ok) {
      const err = await del.json().catch(() => ({}));
      alert("Ошибка удаления: " + (err.error || del.status));
      return;
    }
    const r = await fetch("/api/users", { headers: { "X-Secret": secret } });
    const d = await r.json();
    renderUsers(d.users || []);
  } catch(e) { alert("Ошибка: " + e.message); }
}

document.getElementById("confirmBtn").addEventListener("click", confirmDelete);
document.getElementById("cancelBtn").addEventListener("click", closeModal);
</script>
</body>
</html>
