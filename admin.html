<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN — Пользователи</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    padding: 24px 16px;
    max-width: 700px;
    margin: 0 auto;
  }
  h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .sub { color: #666; font-size: 14px; margin-bottom: 24px; }

  .login-card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    margin-bottom: 20px;
  }
  .login-card input {
    width: 100%; padding: 12px; border: 1.5px solid #ddd;
    border-radius: 10px; font-size: 15px; margin-bottom: 10px; outline: none;
  }
  .login-card input:focus { border-color: #4f46e5; }
  .btn {
    width: 100%; padding: 12px; background: #4f46e5; color: #fff;
    border: none; border-radius: 10px; font-size: 15px;
    font-weight: 700; cursor: pointer;
  }

  table { width: 100%; border-collapse: collapse; }
  .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  th { text-align: left; font-size: 12px; color: #888; font-weight: 600; padding: 6px 10px; border-bottom: 1px solid #eee; }
  td { padding: 12px 10px; font-size: 14px; border-bottom: 1px solid #f5f5f5; }
  tr:last-child td { border-bottom: none; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.on { background: #22c55e; }
  .dot.off { background: #d1d5db; }
  .ip { font-family: monospace; color: #4f46e5; font-size: 13px; }
  .count { background: #ede9fe; color: #4f46e5; padding: 2px 10px; border-radius: 20px; font-size: 13px; font-weight: 700; }
  .empty { text-align: center; color: #aaa; padding: 30px; }
  #error { color: #ef4444; font-size: 14px; margin-top: 8px; }
</style>
</head>
<body>
<h1>👥 Пользователи VPN</h1>
<p class="sub">Все активные конфигурации</p>

<div class="login-card" id="loginCard">
  <input type="password" id="secretInput" placeholder="Введите пароль" onkeydown="if(event.key==='Enter')loadUsers()">
  <button class="btn" onclick="loadUsers()">Войти</button>
  <div id="error"></div>
</div>

<div class="card" id="usersCard" style="display:none">
  <h2>Конфигурации <span class="count" id="count">0</span></h2>
  <table>
    <thead>
      <tr>
        <th>Имя</th>
        <th>IP-адрес</th>
        <th>Статус</th>
      </tr>
    </thead>
    <tbody id="userList"></tbody>
  </table>
  <div class="empty" id="emptyMsg" style="display:none">Пользователей пока нет</div>
</div>

<script>
async function loadUsers() {
  const secret = document.getElementById("secretInput").value;
  const err = document.getElementById("error");
  err.textContent = "";

  try {
    const resp = await fetch("/api/users", {
      headers: { "X-Secret": secret }
    });
    if (resp.status === 403) throw new Error("Неверный пароль");
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    document.getElementById("loginCard").style.display = "none";
    document.getElementById("usersCard").style.display = "block";

    const users = data.users || [];
    document.getElementById("count").textContent = users.length;

    const list = document.getElementById("userList");
    if (users.length === 0) {
      document.getElementById("emptyMsg").style.display = "block";
      return;
    }

    list.innerHTML = users.map(u => `
      <tr>
        <td><b>${u.name || "—"}</b></td>
        <td><span class="ip">${u.ip || "—"}</span></td>
        <td><span class="dot ${u.active ? 'on' : 'off'}"></span>${u.active ? "Подключён" : "Не подключён"}</td>
      </tr>
    `).join("");
  } catch(e) {
    err.textContent = e.message;
  }
}
</script>
</body>
</html>
